services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/taskapp
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-in-production}
      JWT_EXPIRES_IN: 7d
      CLIENT_ORIGIN: http://localhost:5173
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
    restart: unless-stopped
    ports:
      - '8080:80'
    depends_on:
      - backend

  # Optional: Redis for future caching / sessions (not wired in app code)
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - '6379:6379'

volumes:
  mongo_data:
